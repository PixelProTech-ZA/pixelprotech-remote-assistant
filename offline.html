<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Offline — PixelProTech Remote Assistant</title>
<style>
  :root{color-scheme:dark;}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:#0F172A;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;text-align:center;padding:24px;}
  .card{max-width:420px;}
  .ring{width:72px;height:72px;margin:0 auto 20px;border-radius:50%;
    border:3px solid #00FFD5;display:flex;align-items:center;justify-content:center;font-size:28px;color:#00FFD5;}
  h1{font-size:1.3rem;margin:0 0 10px;}
  p{color:#94a3b8;line-height:1.5;font-size:.95rem;}
  button{margin-top:18px;background:linear-gradient(135deg,#00FFD5,#00C896);color:#0F172A;border:0;
    padding:12px 22px;border-radius:10px;font-weight:700;cursor:pointer;}
</style>
</head>
<body>
  <div class="card">
    <div class="ring">⌁</div>
    <h1>You're offline</h1>
    <p>PixelProTech Remote Assistant couldn't reach the network. Diagnostics you've already loaded still work — reconnect to sync reports or run camera/mic tests that need fresh permissions.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
